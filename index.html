<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODA File Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="outer">
        <svg id="viewport"></svg>
        <div id="sidebar">
            <h2>TODA File Analysis Tool</h2>
            <p><em>For very serious use only</em></p>
            <p>Arrows and click select, hover highlights, scroll zooms.
                Highly experimental, results dubious.
                <!-- <a href="">Source</a> -->
            </p>
            <p>
                URL: <input type="text" id="todaurl" value="dq.toda" />
                Upload: <input type="file" id="todafile" accept="" />
            </p>
            <div id="abject"></div>
            <div id="rigcheck"></div>
            <div id="stats"></div>
            <div id="highlight"></div>
            <div id="select"></div>
        </div>
        <script async src="svgiewer.js" type="module"></script>
    </div>
    
    <div id="color-legend">
        <h4 style="margin-top: 0; margin-bottom: 8px;">Stroke Colors</h4>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-default);"></div>
            <span>Default</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-prev);"></div>
            <span>Previous</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-teth);"></div>
            <span>Teth</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-lead);"></div>
            <span>Lead</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-meet);"></div>
            <span>Meet</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-post);"></div>
            <span>Post</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-cargo);"></div>
            <span>Cargo</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-focus);"></div>
            <span>Focus</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-highlight);"></div>
            <span>Highlight</span>
        </div>
        <div class="legend-item">
            <div class="color-swatch" style="background-color: var(--stroke-select);"></div>
            <span>Select</span>
        </div>
    </div>
</body>
</html>
