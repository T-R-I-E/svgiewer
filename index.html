<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODA File Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="outer">
        <svg id="viewport">
            <!-- Main graph will be here -->
            <!-- Legend will be added programmatically as a separate layer -->
        </svg>
        <div id="sidebar">
            <h2>TODA File Analysis Tool</h2>
            <p><em>For very serious use only</em></p>
            <p>Arrows and click select, hover highlights, scroll zooms.
                Highly experimental, results dubious.
                <!-- <a href="">Source</a> -->
            </p>
            <p>
                URL: <input type="text" id="todaurl" value="dq.toda" />
                Upload: <input type="file" id="todafile" accept="" />
            </p>
            <p>
                Search: <input type="text" id="search" value="" />
            </p>
            <div id="abject"></div>
            <div id="rigcheck"></div>
            <div id="stats"></div>
            <div id="highlight"></div>
            <div id="select"></div>
        </div>
        <script async src="svgiewer.js" type="module"></script>
    </div>
</body>
</html>
